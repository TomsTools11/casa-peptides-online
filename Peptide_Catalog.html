<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Labs — Product Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   STEP 1: CSS Custom Properties — Light Theme
   ══════════════════════════════════════════════ */
:root {
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #fce9d0;
  --color-bg-elevated: #f5dfc5;
  --color-bg-hover: #eedbb8;
  --color-text-primary: #222222;
  --color-text-secondary: #50473e;
  --color-text-muted: #6d5f53;
  --color-accent: #d4ba99;
  --color-accent-hover: #9a7e5e;
  --color-accent-bg: rgba(212,186,153,0.15);
  --color-on-accent: #3d2e1e;
  --color-success: #5a8a5e;
  --color-warning: #c47a2a;
  --color-error: #c44e49;
  --color-border: #d4ba99;
  --color-border-light: rgba(212,186,153,0.4);
  --color-form: #FFFFFF;
  --font-display: 'Red Hat Display', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --radius-sm: 0.375rem;
  --radius-md: 0.625rem;
  --radius-lg: 1rem;
  --radius-pill: 2rem;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.06);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 10px 25px -5px rgb(0 0 0 / 0.12), 0 8px 10px -6px rgb(0 0 0 / 0.06);
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
}

/* ── Dark Theme ── */
[data-theme="dark"] {
  --color-bg-primary: #191919;
  --color-bg-secondary: #202020;
  --color-bg-elevated: #2F2F2F;
  --color-bg-hover: #383838;
  --color-text-primary: #FFFFFF;
  --color-text-secondary: #EDEEEE;
  --color-text-muted: #A7A39A;
  --color-accent: #d4ba99;
  --color-accent-hover: #e0c9ab;
  --color-accent-bg: rgba(212,186,153,0.12);
  --color-success: #6aaf70;
  --color-warning: #e0943a;
  --color-error: #e05a55;
  --color-border: #444B4E;
  --color-border-light: rgba(68,75,78,0.6);
  --color-form: #2a3038;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
  --shadow-lg: 0 10px 25px -5px rgb(0 0 0 / 0.4), 0 8px 10px -6px rgb(0 0 0 / 0.3);
}
[data-theme="dark"] tr:hover td { background: var(--color-bg-elevated); }
[data-theme="dark"] .diff-highlight td:not(:first-child) {
  background: rgba(212,186,153,0.08);
  border-left: 3px solid rgba(212,186,153,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--color-bg-primary);
  color: var(--color-text-secondary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  padding-bottom: 100px;
}

/* ── Header ── */
.header {
  background: var(--color-bg-secondary);
  border-bottom: 1px solid var(--color-border-light);
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 1rem;
  cursor: pointer;
  text-decoration: none;
}
.header-logo { height: 44px; }
.header-logo-dark { display: none; }
[data-theme="dark"] .header-logo-light { display: none; }
[data-theme="dark"] .header-logo-dark { display: block; }
.header-subtitle {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 500;
  color: var(--color-text-secondary);
  padding-left: 1rem;
  border-left: 1.5px solid var(--color-border);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 1.25rem;
}
.theme-toggle {
  background: var(--color-bg-primary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-pill);
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.15rem;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}
.theme-toggle:hover {
  border-color: var(--color-accent);
  background: var(--color-accent-bg);
}
.header-stats {
  display: flex;
  gap: 1.5rem;
  font-size: 0.85rem;
  color: var(--color-text-muted);
}
.header-stats strong { color: var(--color-text-primary); }

/* ── Hero Section ── */
.hero-section {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2.5rem 2rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
}
.hero-content h2 {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--color-text-primary);
  letter-spacing: -0.02em;
}
.hero-content p {
  font-size: 0.95rem;
  color: var(--color-text-muted);
  margin-top: 0.35rem;
}
.hero-search { flex-shrink: 0; }

/* ── Search ── */
.search-box {
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--color-form);
  color: var(--color-text-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 0.65rem 1rem 0.65rem 2.5rem;
  font-family: var(--font-body);
  font-size: 0.9rem;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.search-box input:focus {
  outline: none;
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px rgba(212,186,153,0.25);
}
.search-box::before {
  content: '🔍';
  position: absolute;
  left: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
  pointer-events: none;
}
.search-hero input {
  width: 320px;
  border-radius: var(--radius-pill);
  padding: 0.7rem 1.25rem 0.7rem 2.75rem;
}
.search-hero::before { left: 1rem; }

/* ── Category Tabs ── */
.category-tabs {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem 0.5rem;
  display: flex;
  gap: 0.5rem;
  overflow-x: auto;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
}
.category-tabs::-webkit-scrollbar { height: 4px; }
.category-tabs::-webkit-scrollbar-thumb { background: var(--color-border-light); border-radius: 4px; }
.tab-pill {
  background: var(--color-form);
  color: var(--color-text-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-pill);
  padding: 0.45rem 1rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition-fast);
}
.tab-pill:hover {
  border-color: var(--color-accent);
  background: var(--color-accent-bg);
}
.tab-pill.active {
  background: var(--color-accent);
  color: var(--color-on-accent);
  border-color: var(--color-accent);
}

/* ── Controls Bar ── */
.controls {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1rem 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  justify-content: flex-end;
}
.controls-with-search { justify-content: flex-start; }
.controls-with-search .search-box {
  flex: 1;
  min-width: 220px;
}
.price-filter {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--color-text-muted);
}
.price-filter input {
  width: 80px;
  background: var(--color-form);
  color: var(--color-text-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 0.5rem 0.6rem;
  font-family: var(--font-body);
  font-size: 0.85rem;
}
.price-filter input:focus {
  outline: none;
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px rgba(212,186,153,0.25);
}
.sort-select {
  background: var(--color-form);
  color: var(--color-text-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 0.65rem 1rem;
  font-family: var(--font-body);
  font-size: 0.85rem;
  cursor: pointer;
}
.sort-select:focus {
  outline: none;
  border-color: var(--color-accent);
}
.view-toggle {
  display: flex;
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.view-toggle button {
  background: var(--color-form);
  color: var(--color-text-muted);
  border: none;
  padding: 0.65rem 0.85rem;
  cursor: pointer;
  font-size: 1rem;
  transition: all var(--transition-fast);
}
.view-toggle button.active {
  background: var(--color-accent);
  color: var(--color-on-accent);
}

/* ── Main Container ── */
.main { max-width: 1400px; margin: 0 auto; padding: 0 2rem 3rem; }

/* ── Card Grid ── */
.grid {
  display: grid;
  gap: 1.25rem;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
}

/* ── Cards ── */
.card {
  background: var(--color-bg-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  transition: all var(--transition-base);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  position: relative;
}
.card:hover {
  border-color: var(--color-accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.card.compare-selected {
  border-color: var(--color-accent);
  border-width: 2px;
  box-shadow: 0 0 0 3px rgba(212,186,153,0.2);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.5rem;
}
.card-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.05rem;
  color: var(--color-text-primary);
}
.card-cat {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--color-accent-hover);
  background: var(--color-accent-bg);
  padding: 0.15rem 0.5rem;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.card-desc {
  color: var(--color-text-muted);
  font-size: 0.85rem;
  line-height: 1.5;
  flex: 1;
  margin-bottom: 0.75rem;
}
.card-tag {
  display: inline-block;
  font-size: 0.7rem;
  padding: 0.2rem 0.6rem;
  border-radius: var(--radius-pill);
  margin-bottom: 0.75rem;
}
.tag-category {
  background: var(--color-accent-bg);
  color: var(--color-accent-hover);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 0.75rem;
  border-top: 1px solid var(--color-border-light);
}
.card-price {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--color-success);
}
.card-size {
  font-size: 0.8rem;
  color: var(--color-text-muted);
}

/* ── Compare Checkbox (top-RIGHT) ── */
.compare-checkbox {
  position: absolute;
  bottom: 0.85rem;
  right: 0.75rem;
  z-index: 2;
}
.compare-checkbox input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--color-accent);
  cursor: pointer;
}
.compare-checkbox input[type="checkbox"]:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ── Table View ── */
.table-wrapper {
  overflow-x: auto;
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  display: none;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}
thead { background: var(--color-bg-secondary); }
th {
  text-align: left;
  padding: 0.75rem 1rem;
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--color-text-primary);
  border-bottom: 1.5px solid var(--color-border-light);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
th:hover { color: var(--color-accent-hover); }
td {
  padding: 0.65rem 1rem;
  border-bottom: 1px solid var(--color-border-light);
  vertical-align: top;
}
tr:hover td { background: rgba(252,233,208,0.5); }
.cat-cell { font-family: monospace; color: var(--color-accent-hover); font-weight: 500; }
.price-cell { color: var(--color-success); font-weight: 600; white-space: nowrap; }
.desc-cell { color: var(--color-text-muted); font-size: 0.8rem; max-width: 350px; }
tr[data-cat] { cursor: pointer; }

/* ── Breadcrumb ── */
.breadcrumb {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1rem 2rem 0;
  font-size: 0.85rem;
  color: var(--color-text-muted);
}
.breadcrumb a {
  color: var(--color-accent-hover);
  text-decoration: none;
  cursor: pointer;
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span.sep { margin: 0 0.5rem; }

/* ── Category Page Header ── */
.category-header { margin-bottom: 1.5rem; }
.category-header h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.5rem;
  color: var(--color-text-primary);
}
.category-header .count {
  font-size: 0.9rem;
  color: var(--color-text-muted);
  margin-top: 0.25rem;
}

/* ── No Results ── */
.no-results {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--color-text-muted);
}
.no-results h3 {
  font-family: var(--font-display);
  color: var(--color-text-primary);
  margin-bottom: 0.5rem;
}

/* ── Product Detail Page ── */
.product-detail {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem 2rem 3rem;
}
.product-hero {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 2.5rem;
  margin-bottom: 2.5rem;
}
.product-hero-image {
  background: var(--color-bg-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.product-hero-image img {
  max-width: 100%;
  max-height: 320px;
  object-fit: contain;
  opacity: 0.85;
}
.product-hero-info { display: flex; flex-direction: column; gap: 1rem; }
.product-title {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-text-primary);
}
.product-badges {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
}
.badge {
  font-size: 0.8rem;
  padding: 0.3rem 0.75rem;
  border-radius: var(--radius-pill);
  font-weight: 500;
}
.badge-cat {
  background: var(--color-accent-bg);
  color: var(--color-accent-hover);
  font-family: monospace;
}
.badge-category {
  background: var(--color-accent-bg);
  color: var(--color-accent-hover);
  cursor: pointer;
}
.badge-category:hover { background: rgba(212,186,153,0.3); }
.product-description {
  color: var(--color-text-secondary);
  font-size: 1rem;
  line-height: 1.7;
}

/* Size Pills */
.size-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.size-pill {
  background: var(--color-form);
  color: var(--color-text-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-pill);
  padding: 0.4rem 1rem;
  font-size: 0.85rem;
  font-weight: 500;
  text-decoration: none;
  transition: all var(--transition-fast);
  cursor: pointer;
  display: inline-block;
}
.size-pill:hover {
  border-color: var(--color-accent);
  background: var(--color-accent-bg);
}
.size-pill.active {
  background: var(--color-accent);
  color: var(--color-on-accent);
  border-color: var(--color-accent);
}

/* Price Box */
.product-price-box {
  background: var(--color-bg-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.product-price-main {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-success);
}
.product-price-main small {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--color-text-muted);
}
.product-price-box-info {
  font-size: 0.9rem;
  color: var(--color-text-muted);
}
.product-price-size {
  font-size: 0.9rem;
  color: var(--color-text-secondary);
  font-weight: 500;
}

/* Compare Add Button */
.btn-compare-add {
  background: var(--color-accent);
  color: var(--color-on-accent);
  border: none;
  border-radius: var(--radius-md);
  padding: 0.6rem 1.25rem;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: background var(--transition-fast);
  align-self: flex-start;
}
.btn-compare-add:hover { background: var(--color-accent-hover); }
.btn-compare-add.added {
  background: var(--color-bg-elevated);
  color: var(--color-text-muted);
  border: 1.5px solid var(--color-border-light);
}

/* ── Product Tabs ── */
.product-tabs { margin-top: 2rem; }
.tab-nav {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--color-border-light);
  margin-bottom: 1.5rem;
}
.tab-nav-btn {
  background: none;
  border: none;
  padding: 0.75rem 1.5rem;
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--color-text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--transition-fast);
}
.tab-nav-btn:hover { color: var(--color-text-primary); }
.tab-nav-btn.active {
  color: var(--color-accent-hover);
  border-bottom-color: var(--color-accent);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Overview Table */
.info-table {
  width: 100%;
  border-collapse: collapse;
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.info-table th {
  text-align: left;
  padding: 0.75rem 1rem;
  background: var(--color-bg-secondary);
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--color-text-primary);
  width: 160px;
  border-bottom: 1px solid var(--color-border-light);
  font-size: 0.9rem;
}
.info-table td {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--color-border-light);
  font-size: 0.9rem;
}

/* Size Variants Grid (Details tab) */
.size-variants { margin-bottom: 2.5rem; }
.size-variants h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.15rem;
  color: var(--color-text-primary);
  margin-bottom: 1rem;
}
.variant-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.75rem;
}
.variant-card {
  background: var(--color-bg-secondary);
  border: 1.5px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 0.85rem 1rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
}
.variant-card:hover {
  border-color: var(--color-accent);
  background: var(--color-bg-elevated);
}
.variant-card.current {
  border-color: var(--color-accent);
  background: var(--color-accent-bg);
}
.variant-size {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--color-text-primary);
  margin-bottom: 0.25rem;
}
.variant-price {
  font-size: 0.85rem;
  color: var(--color-success);
  font-weight: 500;
}
.variant-cat {
  font-size: 0.7rem;
  color: var(--color-text-muted);
  font-family: monospace;
}

/* Related Products */
.related-products { margin-bottom: 2rem; }
.related-products h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.15rem;
  color: var(--color-text-primary);
  margin-bottom: 1rem;
}

let searchTerm = '';

let priceMax = '';

// Compare state — persisted to sessionStorage
let compareSet = new Set(JSON.parse(sessionStorage.getItem('compareSet') || '[]'));
function saveCompareSet() {
  sessionStorage.setItem('compareSet', JSON.stringify([...compareSet]));
  renderCompareBar();
  document.querySelectorAll('.compare-checkbox input').forEach(cb => {
    cb.checked = compareSet.has(cb.dataset.cat);
    cb.disabled = !cb.checked && compareSet.size >= 4;
  });

  document.querySelectorAll('.card[data-cat]').forEach(card => {
    card.classList.toggle('compare-selected', compareSet.has(card.dataset.cat));
  });
}

// HELPERS
// ══════════════════════════════════════════════
function formatPrice(boxPrice) {
  const perVial = boxPrice / 10;
  return '$' + (Number.isInteger(perVial) ? perVial.toFixed(0) : perVial.toFixed(2));
}

function perVialPrice(boxPrice) {
  return boxPrice / 10;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function navigateTo(hash) {
  window.location.hash = hash;
}

// ══════════════════════════════════════════════
// FILTERING & SORTING
// ══════════════════════════════════════════════
function getFiltered(items) {
  let result = [...items];
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    result = result.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.cat.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q)
    );
  }
  if (priceMin !== '') {
    const min = parseFloat(priceMin);
    if (!isNaN(min)) result = result.filter(p => perVialPrice(p.boxPrice) >= min);
  }
  if (priceMax !== '') {
    const max = parseFloat(priceMax);
    if (!isNaN(max)) result = result.filter(p => perVialPrice(p.boxPrice) <= max);
  }
  const [key, dir] = sortKey.split('-');
  result.sort((a, b) => {
    let va, vb;
    if (key === 'name') { va = a.name; vb = b.name; }
    else if (key === 'price') { va = perVialPrice(a.boxPrice); vb = perVialPrice(b.boxPrice); }
    else if (key === 'cat') { va = a.cat; vb = b.cat; }
    if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return dir === 'asc' ? va - vb : vb - va;
  });
  return result;
}

    html += `<div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by name, catalog #, or description..." value="${escHtml(searchTerm)}">
    </div>`;
  }
  html += `
    <div class="price-filter">
      <span>Price:</span>
      <input type="number" id="priceMinInput" placeholder="Min" value="${escHtml(priceMin)}" min="0" step="0.5">

    </div>
    <select class="sort-select" id="sortSelect">
      <option value="name-asc"${sortKey==='name-asc'?' selected':''}>Name A→Z</option>

      <button id="tableViewBtn" class="${viewMode==='table'?'active':''}" title="Table View">☰</button>
    </div>
  </div>`;
  return html;
}

function buildProductCards(items) {
  return items.map(p => {
    const checked = compareSet.has(p.cat);
    const disabled = !checked && compareSet.size >= 4;
    const selected = checked ? ' compare-selected' : '';
    return `
    <div class="card${selected}" data-cat="${escHtml(p.cat)}">
      <label class="compare-checkbox" onclick="event.stopPropagation()">
        <input type="checkbox" data-cat="${escHtml(p.cat)}" ${checked?'checked':''} ${disabled?'disabled':''} onchange="toggleCompare(this.dataset.cat, this.checked)">
      </label>
      <div class="card-header">
        <div class="card-name">${escHtml(p.name)}</div>
        <div class="card-cat">${escHtml(p.cat)}</div>
      </div>
      <div class="card-desc">${escHtml(p.desc)}</div>
      <span class="card-tag tag-category">${escHtml(p.category)}</span>
      <div class="card-footer">
        <div>
          <div class="card-price">${formatPrice(p.boxPrice)} <span style="font-size:0.75rem;font-weight:400;color:var(--color-text-muted)">/ vial</span></div>
          <div class="card-size">${escHtml(p.size)} per vial &bull; Box of 10: $${p.boxPrice}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildProductTable(items) {
  const rows = items.map(p => {
    const checked = compareSet.has(p.cat);
    const disabled = !checked && compareSet.size >= 4;
    return `
    <tr data-cat="${escHtml(p.cat)}">
      <td onclick="event.stopPropagation()"><input type="checkbox" data-cat="${escHtml(p.cat)}" ${checked?'checked':''} ${disabled?'disabled':''} onchange="toggleCompare(this.dataset.cat, this.checked)" style="accent-color:var(--color-accent);cursor:pointer;width:16px;height:16px;"></td>
      <td class="cat-cell">${escHtml(p.cat)}</td>
      <td style="font-weight:500;color:var(--color-text-primary)">${escHtml(p.name)}</td>
      <td>${escHtml(p.size)}</td>
      <td class="price-cell">${formatPrice(p.boxPrice)}</td>
      <td class="desc-cell">${escHtml(p.desc)}</td>
      <td><span class="card-tag tag-category">${escHtml(p.category)}</span></td>
    </tr>`;
  }).join('');

  return `
  <div class="table-wrapper" style="display:${viewMode==='table'?'block':'none'}">
    <table>
      <thead>
        <tr>
          <th style="width:40px;cursor:default;"></th>
          <th>Cat #</th>
          <th>Product Name</th>
          <th>Size / Vial</th>
          <th>Price / Vial</th>
          <th>Description</th>
          <th>Category</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function buildProductList(items) {
  const noResults = items.length === 0
    ? `<div class="no-results"><h3>No products found</h3><p>Try adjusting your search or filters.</p></div>`
    : '';
  return `
  <div class="main">
    <div class="grid" id="cardGrid" style="display:${viewMode==='grid'?'grid':'none'}">
      ${buildProductCards(items)}
    </div>
    ${buildProductTable(items)}
    ${noResults}
  </div>`;
}

// ══════════════════════════════════════════════
// COMPARE BAR (persistent, pill-shaped)
// ══════════════════════════════════════════════
function renderCompareBar() {
  const bar = document.getElementById('compareBar');
  if (compareSet.size < 2) {
    bar.classList.remove('visible');
    bar.innerHTML = '';
    return;
  }
  bar.classList.add('visible');
  const maxNotice = compareSet.size >= 4 ? '<span class="compare-max-notice">Max 4</span>' : '';
  bar.innerHTML = `
    <span class="compare-count">${compareSet.size} products selected</span>
    ${maxNotice}
    <button class="btn btn-clear" onclick="clearCompare()">Clear</button>
    <button class="btn" onclick="navigateTo('#/compare')">Compare Now →</button>
  `;
}

function toggleCompare(cat, checked) {
  if (checked && compareSet.size < 4) {
    compareSet.add(cat);
  } else {
    compareSet.delete(cat);
  }
  saveCompareSet();
}

function clearCompare() {
  compareSet.clear();
  saveCompareSet();
}

function bindControls(renderFn) {

    searchInput.addEventListener('input', e => { searchTerm = e.target.value; renderFn(); });

  const sortSelect = document.getElementById('sortSelect');
  if (sortSelect) sortSelect.addEventListener('change', e => { sortKey = e.target.value; renderFn(); });

  const priceMinEl = document.getElementById('priceMinInput');
  const priceMaxEl = document.getElementById('priceMaxInput');
  if (priceMinEl) priceMinEl.addEventListener('input', e => { priceMin = e.target.value; renderFn(); });
  if (priceMaxEl) priceMaxEl.addEventListener('input', e => { priceMax = e.target.value; renderFn(); });

  const gridBtn = document.getElementById('gridViewBtn');
  const tableBtn = document.getElementById('tableViewBtn');
  if (gridBtn) gridBtn.addEventListener('click', () => { viewMode = 'grid'; renderFn(); });
  if (tableBtn) tableBtn.addEventListener('click', () => { viewMode = 'table'; renderFn(); });

  // Card click → product page
  document.querySelectorAll('.card[data-cat]').forEach(card => {
    card.addEventListener('click', () => navigateTo('#/product/' + card.dataset.cat));
  });
  // Table row click → product page
  document.querySelectorAll('tr[data-cat]').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT') return;
      navigateTo('#/product/' + row.dataset.cat);
    });
  });
}

// ══════════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════════

// ── Catalog View (Step 5) ──
let catalogCategoryFilter = 'all';

function renderCatalog() {
  const app = document.getElementById('app');
  let source = catalogCategoryFilter === 'all' ? peptides : peptides.filter(p => p.category === catalogCategoryFilter);
  const items = getFiltered(source);

  document.getElementById('totalCount').textContent = peptides.length;
  document.getElementById('showingCount').textContent = items.length;

  // Hero section
  const heroHtml = `
  <div class="hero-section">
    <div class="hero-content">
      <h2>Explore Our Peptide Catalog</h2>
      <p>${peptides.length} products across ${categories.length} categories</p>
    </div>
    <div class="hero-search">
      <div class="search-box search-hero">
        <input type="text" id="searchInput" placeholder="Search products..." value="${escHtml(searchTerm)}">
      </div>
    </div>
  </div>`;

  // Category tabs
  const allCount = peptides.length;
  let tabsHtml = `<div class="category-tabs">
    <button class="tab-pill${catalogCategoryFilter==='all'?' active':''}" data-category="all">All Categories (${allCount})</button>`;
  categories.forEach(cat => {
    const count = productsByCategory[cat].length;
    tabsHtml += `<button class="tab-pill${catalogCategoryFilter===cat?' active':''}" data-category="${escHtml(cat)}">${escHtml(cat)} (${count})</button>`;
  });
  tabsHtml += `</div>`;

  app.innerHTML = heroHtml + tabsHtml + buildControlsBar(false) + buildProductList(items);

  // Category tab click
  document.querySelectorAll('.category-tabs .tab-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      catalogCategoryFilter = btn.dataset.category;
      renderCatalog();
    });
  });

  bindControls(renderCatalog);
}

// ── Category View (Step 6) ──
function renderCategory(categoryName) {
  const app = document.getElementById('app');
  const catProducts = productsByCategory[categoryName];
  if (!catProducts) {
    app.innerHTML = `<div class="main"><div class="no-results"><h3>Category not found</h3><p><a href="#/catalog">Back to Catalog</a></p></div></div>`;
    return;
  }

  const items = getFiltered(catProducts);
  document.getElementById('totalCount').textContent = peptides.length;
  document.getElementById('showingCount').textContent = items.length;

  app.innerHTML =
    `<div class="breadcrumb"><a href="#/catalog">Catalog</a><span class="sep">›</span>${escHtml(categoryName)}</div>` +
    buildControlsBar(true) +
    `<div class="main"><div class="category-header"><h2>${escHtml(categoryName)}</h2><div class="count">${catProducts.length} product${catProducts.length!==1?'s':''}</div></div></div>` +
    buildProductList(items);

  bindControls(() => renderCategory(categoryName));
}

// ── Product Detail View (Step 7) ──
function renderProduct(catNum) {
  const app = document.getElementById('app');
  const product = productByCat[catNum];
  if (!product) {
    app.innerHTML = `<div class="main"><div class="no-results"><h3>Product not found</h3><p><a href="#/catalog">Back to Catalog</a></p></div></div>`;
    return;
  }

  document.getElementById('totalCount').textContent = peptides.length;
  document.getElementById('showingCount').textContent = '1';

  // Size variants — pills in hero
  const variants = productsByBaseName[product.name] || [];
  let sizePillsHtml = '';
  if (variants.length > 1) {
    const pills = variants.map(v =>
      `<a href="#/product/${escHtml(v.cat)}" class="size-pill${v.cat === product.cat ? ' active' : ''}">${escHtml(v.size)}</a>`
    ).join('');
    sizePillsHtml = `<div class="size-pills">${pills}</div>`;
  }

  // Size variants grid for Details tab
  let variantsGridHtml = '';
  if (variants.length > 1) {
    const variantCards = variants.map(v => `
      <div class="variant-card${v.cat === product.cat ? ' current' : ''}" onclick="navigateTo('#/product/${escHtml(v.cat)}')">
        <div class="variant-size">${escHtml(v.size)}</div>
        <div class="variant-price">${formatPrice(v.boxPrice)}/vial</div>
        <div class="variant-cat">${escHtml(v.cat)}</div>
      </div>
    `).join('');
    variantsGridHtml = `
      <div class="size-variants">
        <h3>All Size Variants</h3>
        <div class="variant-grid">${variantCards}</div>
      </div>`;
  }

  // Related products — same category, excluding same-name variants
  const variantCats = new Set(variants.map(v => v.cat));
  const related = (productsByCategory[product.category] || [])
    .filter(p => !variantCats.has(p.cat))
    .slice(0, 6);
  let relatedHtml = '';
  if (related.length > 0) {
    const relatedCards = related.map(p => `
      <div class="card" data-cat="${escHtml(p.cat)}" style="cursor:pointer" onclick="navigateTo('#/product/${escHtml(p.cat)}')">
        <div class="card-header">
          <div class="card-name">${escHtml(p.name)}</div>
          <div class="card-cat">${escHtml(p.cat)}</div>
        </div>
        <div class="card-desc">${escHtml(p.desc)}</div>
        <div class="card-footer">
          <div>
            <div class="card-price">${formatPrice(p.boxPrice)} <span style="font-size:0.75rem;font-weight:400;color:var(--color-text-muted)">/ vial</span></div>
            <div class="card-size">${escHtml(p.size)} per vial</div>
          </div>
        </div>
      </div>
    `).join('');
    relatedHtml = `
      <div class="related-products">
        <h3>Related Products in ${escHtml(product.category)}</h3>
        <div class="grid">${relatedCards}</div>
      </div>`;
  }

  const isInCompare = compareSet.has(product.cat);
  const compareBtnText = isInCompare ? 'Remove from Compare' : 'Add to Compare';
  const compareBtnClass = isInCompare ? 'btn-compare-add added' : 'btn-compare-add';

  app.innerHTML = `
    <div class="breadcrumb">
      <a href="#/catalog">Catalog</a><span class="sep">›</span>
      <a href="#/category/${encodeURIComponent(product.category)}">${escHtml(product.category)}</a><span class="sep">›</span>
      ${escHtml(product.name)}
    </div>
    <div class="product-detail">
      <div class="product-hero">
        <div class="product-hero-image">
          <img src="Images/Casa-logos/bottle_blank_design_transparent.png" alt="Product bottle">
        </div>
        <div class="product-hero-info">
          <div class="product-title">${escHtml(product.name)}</div>
          <div class="product-badges">
            <span class="badge badge-cat">${escHtml(product.cat)}</span>
            <span class="badge badge-category" onclick="navigateTo('#/category/${encodeURIComponent(product.category)}')">${escHtml(product.category)}</span>
          </div>
          <div class="product-description">${escHtml(product.desc)}</div>
          ${sizePillsHtml}
          <div class="product-price-box">
            <div class="product-price-size">${escHtml(product.size)} per vial</div>
            <div class="product-price-main">${formatPrice(product.boxPrice)} <small>/ vial</small></div>
            <div class="product-price-box-info">Box of 10 vials: <strong style="color:var(--color-text-primary)">$${product.boxPrice}</strong></div>
          </div>
          <button class="${compareBtnClass}" id="compareBtn" onclick="handleProductCompare('${escHtml(product.cat)}')">${compareBtnText}</button>
        </div>
      </div>

      <div class="product-tabs">
        <div class="tab-nav">
          <button class="tab-nav-btn active" data-tab="overview">Overview</button>
          <button class="tab-nav-btn" data-tab="details">Details</button>
        </div>
        <div class="tab-panel active" id="panel-overview">
          <table class="info-table">
            <tr><th>Category</th><td>${escHtml(product.category)}</td></tr>
            <tr><th>Catalog No.</th><td style="font-family:monospace;color:var(--color-accent-hover)">${escHtml(product.cat)}</td></tr>
            <tr><th>Size / Vial</th><td>${escHtml(product.size)}</td></tr>
            <tr><th>Description</th><td>${escHtml(product.desc)}</td></tr>
            <tr><th>Box Contents</th><td>10 vials × ${escHtml(product.size)}</td></tr>
          </table>
        </div>
        <div class="tab-panel" id="panel-details">
          ${variantsGridHtml}
          ${relatedHtml}
        </div>
      </div>
    </div>
  `;

  // Tab switching
  document.querySelectorAll('.tab-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });
}

function handleProductCompare(cat) {
  const inSet = compareSet.has(cat);
  if (inSet) {
    compareSet.delete(cat);
  } else if (compareSet.size < 4) {
    compareSet.add(cat);
  }
  saveCompareSet();
  const btn = document.getElementById('compareBtn');
  if (btn) {
    const nowIn = compareSet.has(cat);
    btn.textContent = nowIn ? 'Remove from Compare' : 'Add to Compare';
    btn.className = nowIn ? 'btn-compare-add added' : 'btn-compare-add';
  }
}

// ── Compare View (Step 9-10) ──
function renderCompare() {
  const app = document.getElementById('app');
  document.getElementById('totalCount').textContent = peptides.length;
  document.getElementById('showingCount').textContent = compareSet.size;

  if (compareSet.size < 2) {
    app.innerHTML = `
      <div class="breadcrumb"><a href="#/catalog">Catalog</a><span class="sep">›</span>Compare</div>
      <div class="compare-view">
        <div class="compare-view-header">
          <h2>Product Comparison</h2>
        </div>
        <div class="compare-empty">
          <h3>Not enough products selected</h3>
          <p>Select at least 2 products to compare. <a href="#/catalog">Browse the catalog</a> and use the checkboxes to select products.</p>
        </div>
      </div>`;
    return;
  }

  const products = [...compareSet].map(cat => productByCat[cat]).filter(Boolean);
  const fields = [
    { label: 'Product Name', key: 'name' },
    { label: 'Catalog #', key: 'cat' },
    { label: 'Category', key: 'category' },
    { label: 'Size', key: 'size' },
    { label: 'Price / Vial', key: p => formatPrice(p.boxPrice) },
    { label: 'Box Price (10 vials)', key: p => '$' + p.boxPrice },
    { label: 'Description', key: 'desc' },
  ];

  const headerCols = products.map(p =>
    `<td class="col-header">${escHtml(p.name)} (${escHtml(p.cat)})<span class="col-remove" onclick="toggleCompare('${escHtml(p.cat)}', false); renderCompare();">&times;</span></td>`
  ).join('');

  const rows = fields.map(f => {
    const values = products.map(p => typeof f.key === 'function' ? f.key(p) : p[f.key]);
    const allSame = values.every(v => v === values[0]);
    const rowClass = allSame ? '' : 'diff-highlight';
    const cells = values.map(v => `<td>${escHtml(v)}</td>`).join('');
    return `<tr class="${rowClass}" data-diff="${allSame ? 'same' : 'diff'}"><th>${escHtml(f.label)}</th>${cells}</tr>`;
  }).join('');

  app.innerHTML = `
    <div class="breadcrumb"><a href="#/catalog">Catalog</a><span class="sep">›</span>Compare</div>
    <div class="compare-view">
      <div class="compare-view-header">
        <span class="compare-badge">${compareSet.size} Selected</span>
        <h2>Compare Products</h2>
      </div>
      <div class="highlight-toggle">
        <label class="toggle-switch">
          <input type="checkbox" id="highlightToggle" checked>
          <span class="toggle-slider"></span>
        </label>
        <span>Highlight Differences</span>
      </div>
      <div style="overflow-x:auto;">
        <table class="compare-table">
          <thead><tr><th></th>${headerCols}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('highlightToggle').addEventListener('change', e => {
    document.querySelectorAll('.compare-table tr[data-diff="diff"]').forEach(tr => {
      tr.classList.toggle('diff-highlight', e.target.checked);
    });
  });
}

// ══════════════════════════════════════════════
// THEME TOGGLE
// ══════════════════════════════════════════════
function getPreferredTheme() {
  const stored = localStorage.getItem('theme');
  if (stored) return stored;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

applyTheme(getPreferredTheme());
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
});

// ══════════════════════════════════════════════
// ROUTER (Step 3)
// ══════════════════════════════════════════════
function route() {
  const hash = window.location.hash || '#/catalog';
  const parts = hash.replace('#/', '').split('/');
  const view = parts[0] || 'catalog';

  if (view === 'category') {
    searchTerm = '';
    priceMin = '';
    priceMax = '';
  }

  switch (view) {
    case 'catalog':
    case '':
      renderCatalog();
      break;
    case 'category':
      renderCategory(decodeURIComponent(parts.slice(1).join('/')));
      break;
    case 'product':
      renderProduct(decodeURIComponent(parts[1] || ''));
      break;
    case 'compare':
      renderCompare();
      break;
    default:
      renderCatalog();
  }

  renderCompareBar();
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', route);
route();
</script>
